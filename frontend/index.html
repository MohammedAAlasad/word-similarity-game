<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Word Game</h1>

    <p>
        Try to guess a word that is related to the secret word.
        Enter your guess and submit it to see how close you are.

    <input type="text" id="guessInput" placeholder="Enter your guess">

    <button id="submitBtn">Submit</button>

    <div id="results"></div>

    <script src="script.js"></script>
</body>
</html>
